services:
  unhrdb-api:
    build: ./api
    image: unhrdb-api:latest
    container_name: unhrdb-api
    ports:
      # Bind to localhost only — nginx routes external traffic in.
      # Same pattern as echr-api (8000) / uhri-dataset-api (8001).
      - "127.0.0.1:8002:8002"
    volumes:
      # SQLite + manifest live in ./data on the host. Mount read-only;
      # the API uses ?mode=ro for sqlite3.connect() too, defence in depth.
      - ./data:/data:ro
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 128m
    environment:
      - UNHRDB_DB_PATH=/data/unhrdb.sqlite3
      - UNHRDB_VERSION=v17-sprint1
