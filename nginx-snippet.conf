# nginx snippet — paste inside the existing
#   server { listen 443 ssl http2; server_name 150.254.115.204; ... }
# block in /etc/nginx/sites-enabled/default
#
# Then:  sudo nginx -t && sudo systemctl reload nginx

upstream unhrdb_api {
  server 127.0.0.1:8002;
}

# (Add the location block below INSIDE the existing server {} that
# already proxies /echr-api/ and /uhri-api/.)

location /unhrdb-api/ {
  rewrite ^/unhrdb-api/(.*)$ /$1 break;
  proxy_pass http://unhrdb_api;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 60s;
  proxy_send_timeout 60s;

  # GZip is already on the API side; suppress nginx's own to avoid
  # double-compression CPU hit.
  gzip off;

  # Public read-only API; allow standard caching by intermediaries.
  add_header Cache-Control "public, max-age=120";
}
